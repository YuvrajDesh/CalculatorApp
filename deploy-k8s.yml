- name: Deploy Calculator App to Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Deploy application
      kubernetes.core.k8s:
        state: present
        namespace: default
        src: k8s/deployment.yaml

    - name: Expose application
      kubernetes.core.k8s:
        state: present
        namespace: default
        src: k8s/service.yaml

